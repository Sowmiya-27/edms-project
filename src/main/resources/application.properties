# ===============================
# APPLICATION
# ===============================
spring.application.name=edms
server.port=8080


# ===============================
# POSTGRESQL DATABASE
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/edms_db
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# ===============================
# TEAM 5 RAG API CONFIG
# ===============================
team5.rag.api.url=https://team5-rag-api.com
team5.rag.api.key=YOUR_API_KEY_HERE

file.upload-dir=D:/edms_uploads/